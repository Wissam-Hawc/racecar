[env]
;compile for esp32
platform = espressif32
framework = arduino
board = esp-wrover-kit
monitor_speed = 9600
upload_speed = 115200 
build_flags = -DBOARD_HAS_PSRAM

; Libraries: MQTT (knolleary, same as the course) + servo (for the scanner).
lib_deps =
    knolleary/PubSubClient@^2.8
    madhephaestus/ESP32Servo@^0.13.0

[env:wissam]
build_flags = ${env.build_flags} -D CAR_NAME=\"wissam\"

[env:car2]
build_flags = ${env.build_flags} -D CAR_NAME=\"car2\"
